<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text → PNG</title>

<!-- エフェクトファイル（新しいエフェクトはここに追加） -->
<script src="effects/stroke.js"></script>
<script src="effects/shadow.js"></script>
<script src="effects/glow.js"></script>
<script src="effects/effects-loader.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0e0e0e;
    --panel: #171717;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #666;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header h1 span { color: var(--accent); }
  header p { font-size: 11px; color: var(--muted); }

  .app {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 61px);
  }

  /* ── 左パネル ── */
  .panel {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 10px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }

  /* フォントアップロード */
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(232,255,71,0.04); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone .upload-icon { font-size: 20px; margin-bottom: 4px; }
  .upload-zone .upload-text { font-size: 11px; color: var(--muted); }
  .upload-zone .font-name { font-size: 11px; color: var(--accent); margin-top: 4px; font-weight: 700; }

  /* 汎用入力行 */
  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .input-row label { font-size: 12px; color: var(--muted); white-space: nowrap; min-width: 80px; }

  input[type="number"] {
    width: 74px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 6px 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="number"]:focus { border-color: var(--accent); }

  /* 揃えボタングループ */
  .align-group {
    display: flex;
    gap: 4px;
  }
  .align-btn {
    flex: 1;
    padding: 7px 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .align-btn:hover { border-color: var(--accent); color: var(--text); }
  .align-btn.active { background: var(--accent); color: #0e0e0e; border-color: var(--accent); font-weight: 700; }

  /* 縦書きトグル */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }
  .toggle-label { font-size: 12px; color: var(--muted); }
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 10px;
    transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute;
    left: 2px; top: 2px;
    width: 16px; height: 16px;
    background: var(--text);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); background: #0e0e0e; }

  /* RGBスライダー */
  .rgb-group { display: flex; flex-direction: column; gap: 8px; }
  .rgb-row { display: grid; grid-template-columns: 16px 1fr 42px; align-items: center; gap: 8px; }
  .rgb-letter { font-size: 11px; font-weight: 700; }
  .rgb-letter.r { color: #ff6b6b; }
  .rgb-letter.g { color: #6bff8e; }
  .rgb-letter.b { color: #6bb5ff; }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"].r-slider { background: linear-gradient(to right, #1a0000, #ff6b6b); }
  input[type="range"].g-slider { background: linear-gradient(to right, #001a00, #6bff8e); }
  input[type="range"].b-slider { background: linear-gradient(to right, #00001a, #6bb5ff); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--border);
  }
  .rgb-value { font-size: 12px; text-align: right; font-variant-numeric: tabular-nums; }

  .color-preview-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .color-swatch {
    width: 32px; height: 32px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: repeating-conic-gradient(#333 0% 25%, #222 0% 50%) 0 0 / 8px 8px;
    position: relative; overflow: hidden;
  }
  .color-swatch::after { content: ''; position: absolute; inset: 0; background: var(--preview-color, white); }
  .color-hex { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

  /* ── エフェクトセクション ── */
  .effect-add-row {
    display: flex;
    gap: 6px;
  }
  select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 7px 8px;
    outline: none;
  }
  .add-btn {
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { background: var(--accent); color: #0e0e0e; }

  #effectStack { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

  .effect-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .effect-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    background: #1e1e1e;
  }
  .effect-card-label { font-size: 12px; font-weight: 700; color: var(--accent); }
  .effect-card-actions { display: flex; gap: 4px; }
  .effect-card-actions button {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 11px;
    padding: 2px 6px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .effect-card-actions button:hover { border-color: var(--text); color: var(--text); }
  .effect-card-actions button:disabled { opacity: 0.3; cursor: not-allowed; }
  .effect-card-actions .remove-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

  .effect-param-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-bottom: 1px solid #1a1a1a;
  }
  .effect-param-row:last-child { border-bottom: none; }
  .effect-param-row label { font-size: 11px; color: var(--muted); min-width: 50px; }
  .effect-param-row input[type="color"] {
    width: 36px; height: 26px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px;
    background: var(--bg);
    cursor: pointer;
  }
  .effect-param-row input[type="number"] { width: 64px; font-size: 12px; padding: 4px 6px; }
  .range-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
  .range-wrap input[type="range"] { flex: 1; }
  .param-value { font-size: 11px; color: var(--muted); min-width: 32px; text-align: right; }

  /* DLボタン */
  .dl-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    border-radius: var(--radius);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    margin-top: auto;
  }
  .dl-btn:hover { background: #f5ff80; transform: translateY(-1px); }
  .dl-btn:active { transform: translateY(0); }

  /* ── プレビュー ── */
  .preview-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    gap: 16px;
    position: relative;
  }
  .preview-label {
    position: absolute; top: 20px; left: 24px;
    font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
  }
  .canvas-wrapper {
    background: repeating-conic-gradient(#1e1e1e 0% 25%, #171717 0% 50%) 0 0 / 16px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    max-width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { max-width: 100%; height: auto; display: block; }
  .size-info { font-size: 11px; color: var(--muted); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  hr.divider { border: none; border-top: 1px solid var(--border); margin: 0; }
</style>
</head>
<body>

<header>
  <h1>Text <span>→</span> PNG</h1>
  <p>カスタムフォント → 透過PNG出力</p>
</header>

<div class="app">
  <!-- 左パネル -->
  <div class="panel">

    <!-- テキスト -->
    <div>
      <div class="section-label">テキスト</div>
      <textarea id="textInput" placeholder="ここにテキストを入力...">サンプルテキスト</textarea>
    </div>

    <!-- フォント -->
    <div>
      <div class="section-label">フォントファイル</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fontFile" accept=".ttf,.otf">
        <div class="upload-icon">⬆</div>
        <div class="upload-text">.ttf / .otf をドロップまたはクリック</div>
        <div class="font-name" id="fontNameLabel"></div>
      </div>
    </div>

    <hr class="divider">

    <!-- フォントサイズ・余白 -->
    <div>
      <div class="section-label">サイズ・余白</div>
      <div class="input-row">
        <label>サイズ (px)</label>
        <input type="number" id="fontSize" value="72" min="8" max="500">
      </div>
      <div class="input-row">
        <label>行間 (倍率)</label>
        <input type="number" id="lineHeight" value="1.3" min="0.8" max="3" step="0.05">
      </div>
      <div class="input-row">
        <label>余白 (px)</label>
        <input type="number" id="padding" value="20" min="0" max="200">
      </div>
    </div>

    <!-- 揃え -->
    <div>
      <div class="section-label">揃え（横）</div>
      <div class="align-group" id="hAlignGroup">
        <button class="align-btn active" data-align="left">左</button>
        <button class="align-btn" data-align="center">中央</button>
        <button class="align-btn" data-align="right">右</button>
      </div>

      <!-- 縦書き -->
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="verticalToggle">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span class="toggle-label">縦書き</span>
      </div>

      <!-- 縦書き時の揃え（縦方向） -->
      <div id="vAlignArea" style="display:none; margin-top:10px;">
        <div class="section-label" style="margin-bottom:6px;">揃え（縦書き）</div>
        <div class="align-group" id="vAlignGroup">
          <button class="align-btn active" data-align="start">上</button>
          <button class="align-btn" data-align="center">中央（縦）</button>
          <button class="align-btn" data-align="end">下</button>
        </div>
      </div>
    </div>

    <hr class="divider">

    <!-- 文字色 -->
    <div>
      <div class="section-label">文字色 (RGB)</div>
      <div class="rgb-group">
        <div class="rgb-row">
          <span class="rgb-letter r">R</span>
          <input type="range" class="r-slider" id="colR" min="0" max="255" value="255">
          <span class="rgb-value" id="valR">255</span>
        </div>
        <div class="rgb-row">
          <span class="rgb-letter g">G</span>
          <input type="range" class="g-slider" id="colG" min="0" max="255" value="255">
          <span class="rgb-value" id="valG">255</span>
        </div>
        <div class="rgb-row">
          <span class="rgb-letter b">B</span>
          <input type="range" class="b-slider" id="colB" min="0" max="255" value="255">
          <span class="rgb-value" id="valB">255</span>
        </div>
      </div>
      <div class="color-preview-row">
        <div class="color-swatch" id="colorSwatch"></div>
        <span class="color-hex" id="colorHex">#FFFFFF</span>
      </div>
    </div>

    <hr class="divider">

    <!-- 画像エフェクト -->
    <div>
      <div class="section-label">画像エフェクト</div>
      <div class="effect-add-row">
        <select id="effectSelector"></select>
        <button class="add-btn" onclick="onAddEffect()">+ 追加</button>
      </div>
      <div id="effectStack"></div>
    </div>

    <!-- DL -->
    <button class="dl-btn" onclick="downloadPNG()">↓ &nbsp;PNG をダウンロード</button>

  </div>

  <!-- プレビュー -->
  <div class="preview-area">
    <div class="preview-label">Preview</div>
    <div class="canvas-wrapper">
      <canvas id="previewCanvas"></canvas>
    </div>
    <div class="size-info" id="sizeInfo">–</div>
  </div>
</div>

<script>
// ─── 状態 ───
let customFontLoaded = false;
let customFontFamily = '';
let hAlign = 'left';   // left / center / right
let vAlign = 'start';  // start / center / end
let isVertical = false;

const canvas = document.getElementById('previewCanvas');
const ctx    = canvas.getContext('2d');

// ─── エフェクト初期化 ───
populateEffectSelector();
window.__effectChangeCallback = render;

// ─── フォント ───
document.getElementById('fontFile').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (file) await loadFont(file);
});

const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', async (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && (file.name.endsWith('.ttf') || file.name.endsWith('.otf'))) await loadFont(file);
});

async function loadFont(file) {
  const url = URL.createObjectURL(file);
  const name = file.name.replace(/\.[^.]+$/, '').replace(/\s/g, '_') + '_custom';
  customFontFamily = name;
  try {
    const font = new FontFace(name, `url(${url})`);
    await font.load();
    document.fonts.add(font);
    customFontLoaded = true;
    document.getElementById('fontNameLabel').textContent = '✓ ' + file.name;
    render();
  } catch(err) {
    document.getElementById('fontNameLabel').textContent = '読み込み失敗';
  }
}

// ─── 揃えボタン ───
document.getElementById('hAlignGroup').addEventListener('click', (e) => {
  const btn = e.target.closest('.align-btn');
  if (!btn) return;
  hAlign = btn.dataset.align;
  document.querySelectorAll('#hAlignGroup .align-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('vAlignGroup').addEventListener('click', (e) => {
  const btn = e.target.closest('.align-btn');
  if (!btn) return;
  vAlign = btn.dataset.align;
  document.querySelectorAll('#vAlignGroup .align-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

// ─── 縦書きトグル ───
document.getElementById('verticalToggle').addEventListener('change', (e) => {
  isVertical = e.target.checked;
  document.getElementById('vAlignArea').style.display = isVertical ? 'block' : 'none';
  render();
});

// ─── RGB ───
['colR','colG','colB'].forEach(id => document.getElementById(id).addEventListener('input', updateColor));

function updateColor() {
  const r = +document.getElementById('colR').value;
  const g = +document.getElementById('colG').value;
  const b = +document.getElementById('colB').value;
  document.getElementById('valR').textContent = r;
  document.getElementById('valG').textContent = g;
  document.getElementById('valB').textContent = b;
  const hex = `#${toHex(r)}${toHex(g)}${toHex(b)}`;
  document.getElementById('colorHex').textContent = hex;
  document.getElementById('colorSwatch').style.setProperty('--preview-color', `rgb(${r},${g},${b})`);
  render();
}
function toHex(v) { return v.toString(16).padStart(2, '0').toUpperCase(); }

// ─── その他入力 ───
['textInput','fontSize','lineHeight','padding'].forEach(id =>
  document.getElementById(id).addEventListener('input', render)
);

// ─── エフェクト追加 ───
function onAddEffect() {
  const sel = document.getElementById('effectSelector');
  addEffect(sel.value, render);
}

// ─── レンダリング ───
function render() {
  const text    = document.getElementById('textInput').value || ' ';
  const size    = Math.max(8, +document.getElementById('fontSize').value || 72);
  const lhMul   = +document.getElementById('lineHeight').value || 1.3;
  const pad     = +document.getElementById('padding').value || 0;
  const r = +document.getElementById('colR').value;
  const g = +document.getElementById('colG').value;
  const b = +document.getElementById('colB').value;

  const fontFamily = customFontLoaded ? `'${customFontFamily}'` : 'sans-serif';
  const font = `${size}px ${fontFamily}`;
  const lineHeight = size * lhMul;
  const lines = text.split('\n');

  if (isVertical) {
    renderVertical(lines, size, lineHeight, pad, r, g, b, font, fontFamily);
  } else {
    renderHorizontal(lines, size, lineHeight, pad, r, g, b, font, fontFamily);
  }
}

function renderHorizontal(lines, size, lineHeight, pad, r, g, b, font, fontFamily) {
  // サイズ計測
  ctx.font = font;
  let maxW = 0;
  lines.forEach(line => {
    const w = ctx.measureText(line).width;
    if (w > maxW) maxW = w;
  });

  const W = Math.ceil(maxW) + pad * 2;
  const H = Math.ceil(lineHeight * lines.length) + pad * 2;
  canvas.width  = W || 2;
  canvas.height = H || 2;
  ctx.clearRect(0, 0, W, H);

  const layout = { font, size, lineHeight, padding: pad, align: hAlign, vertical: false, fontFamily };

  // エフェクト（本文より先に描画 → 下レイヤー）
  applyEffects(ctx, lines, layout);

  // 本文描画
  ctx.font = font;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.textBaseline = 'top';

  lines.forEach((line, i) => {
    let x;
    const metrics = ctx.measureText(line);
    if (hAlign === 'center') x = (W - metrics.width) / 2;
    else if (hAlign === 'right') x = W - pad - metrics.width;
    else x = pad;
    ctx.fillText(line, x, pad + i * lineHeight);
  });

  document.getElementById('sizeInfo').textContent = `${W} × ${H} px`;
}

function renderVertical(lines, size, lineHeight, pad, r, g, b, font, fontFamily) {
  // 縦書き：各行を1列として右→左に並べる
  const colWidth = size * 1.2;
  const numCols  = lines.length;
  const maxChars = Math.max(...lines.map(l => l.length));

  const W = Math.ceil(colWidth * numCols) + pad * 2;
  const H = Math.ceil(lineHeight * maxChars) + pad * 2;
  canvas.width  = W || 2;
  canvas.height = H || 2;
  ctx.clearRect(0, 0, W, H);

  // 縦書きの水平揃え（列の揃え）は hAlign を使用
  // 縦書きの垂直揃え（各列内の文字の縦位置）は vAlign を使用

  const layout = { font, size, lineHeight, padding: pad, align: vAlign, vertical: true, fontFamily };
  applyEffects(ctx, lines, layout);

  ctx.font = font;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.textBaseline = 'top';

  lines.forEach((line, col) => {
    const chars = line.split('');
    const colChars = chars.length;

    // 各列の縦位置（vAlign）
    let startY;
    if (vAlign === 'start') startY = pad;
    else if (vAlign === 'end') startY = H - pad - colChars * lineHeight;
    else startY = (H - colChars * lineHeight) / 2;

    // 列の横位置（hAlign: 列全体の並び方）
    let colStart;
    if (hAlign === 'left') {
      // 左から並べる（右→左の縦書きを左から）
      colStart = W - pad - colWidth * (col + 1);
    } else if (hAlign === 'right') {
      colStart = pad + colWidth * (numCols - col - 1);
    } else {
      // center: 全体を中央に
      const totalW = colWidth * numCols;
      colStart = (W - totalW) / 2 + colWidth * (numCols - col - 1);
    }

    const x = colStart + colWidth / 2 - size / 2;

    chars.forEach((char, i) => {
      ctx.fillText(char, x, startY + i * lineHeight);
    });
  });

  document.getElementById('sizeInfo').textContent = `${W} × ${H} px`;
}

// ─── DL ───
function downloadPNG() {
  const link = document.createElement('a');
  const text = document.getElementById('textInput').value || ' ';
  const firstLine = text.split("\n")[0];
  link.download = `${firstLine}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// 初期描画
updateColor();
render();
</script>
