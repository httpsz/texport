<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text → PNG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0e0e0e;
    --panel: #171717;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header h1 span { color: var(--accent); }

  header p {
    font-size: 11px;
    color: var(--muted);
  }

  .app {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 65px);
  }

  /* ── パネル ── */
  .panel {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* テキストエリア */
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 12px;
    resize: vertical;
    min-height: 90px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }

  /* フォントアップロード */
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(232,255,71,0.04); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone .upload-icon { font-size: 24px; margin-bottom: 8px; }
  .upload-zone .upload-text { font-size: 12px; color: var(--muted); }
  .upload-zone .font-name { font-size: 12px; color: var(--accent); margin-top: 6px; font-weight: 700; }

  /* 数値入力 */
  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .input-row label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 90px;
  }

  input[type="number"] {
    width: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="number"]:focus { border-color: var(--accent); }

  /* RGBスライダー */
  .rgb-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .rgb-row {
    display: grid;
    grid-template-columns: 16px 1fr 46px;
    align-items: center;
    gap: 10px;
  }

  .rgb-letter {
    font-size: 11px;
    font-weight: 700;
  }
  .rgb-letter.r { color: #ff6b6b; }
  .rgb-letter.g { color: #6bff8e; }
  .rgb-letter.b { color: #6bb5ff; }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"].r-slider { background: linear-gradient(to right, #1a0000, #ff6b6b); }
  input[type="range"].g-slider { background: linear-gradient(to right, #001a00, #6bff8e); }
  input[type="range"].b-slider { background: linear-gradient(to right, #00001a, #6bb5ff); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--border);
  }

  .rgb-value {
    font-size: 12px;
    color: var(--text);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* カラープレビュー */
  .color-preview-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 4px;
  }

  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: repeating-conic-gradient(#333 0% 25%, #222 0% 50%) 0 0 / 8px 8px;
    position: relative;
    overflow: hidden;
  }
  .color-swatch::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--preview-color, white);
  }

  .color-hex {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* DLボタン */
  .dl-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    border-radius: var(--radius);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    margin-top: auto;
  }
  .dl-btn:hover { background: #f5ff80; transform: translateY(-1px); }
  .dl-btn:active { transform: translateY(0); }
  .dl-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  /* ── プレビューエリア ── */
  .preview-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    gap: 20px;
    position: relative;
    overflow: hidden;
  }

  .preview-label {
    position: absolute;
    top: 20px;
    left: 24px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .canvas-wrapper {
    background: repeating-conic-gradient(#1e1e1e 0% 25%, #171717 0% 50%) 0 0 / 16px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    max-width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  canvas {
    max-width: 100%;
    height: auto;
    display: block;
  }

  .size-info {
    font-size: 11px;
    color: var(--muted);
  }

  /* スクロールバー */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Text <span>→</span> PNG</h1>
  <p>カスタムフォント → 透過PNG出力</p>
</header>

<div class="app">
  <!-- 左パネル -->
  <div class="panel">

    <!-- テキスト入力 -->
    <div>
      <div class="section-label">テキスト</div>
      <textarea id="textInput" placeholder="ここにテキストを入力...">text</textarea>
    </div>

    <!-- フォントアップロード -->
    <div>
      <div class="section-label">フォントファイル</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fontFile" accept=".ttf,.otf">
        <div class="upload-icon">⬆</div>
        <div class="upload-text">.ttf / .otf をドロップまたはクリック</div>
        <div class="font-name" id="fontName"></div>
      </div>
    </div>

    <!-- フォントサイズ -->
    <div>
      <div class="section-label">フォントサイズ</div>
      <div class="input-row">
        <label>サイズ (px)</label>
        <input type="number" id="fontSize" value="72" min="8" max="500">
      </div>
      <div class="input-row" style="margin-top:10px">
        <label>行間 (倍率)</label>
        <input type="number" id="lineHeight" value="1.3" min="0.8" max="3" step="0.05">
      </div>
      <div class="input-row" style="margin-top:10px">
        <label>余白 (px)</label>
        <input type="number" id="padding" value="20" min="0" max="200">
      </div>
    </div>

    <!-- 文字色 RGB -->
    <div>
      <div class="section-label">文字色 (RGB)</div>
      <div class="rgb-group">
        <div class="rgb-row">
          <span class="rgb-letter r">R</span>
          <input type="range" class="r-slider" id="colR" min="0" max="255" value="255">
          <span class="rgb-value" id="valR">255</span>
        </div>
        <div class="rgb-row">
          <span class="rgb-letter g">G</span>
          <input type="range" class="g-slider" id="colG" min="0" max="255" value="255">
          <span class="rgb-value" id="valG">255</span>
        </div>
        <div class="rgb-row">
          <span class="rgb-letter b">B</span>
          <input type="range" class="b-slider" id="colB" min="0" max="255" value="255">
          <span class="rgb-value" id="valB">255</span>
        </div>
      </div>
      <div class="color-preview-row">
        <div class="color-swatch" id="colorSwatch"></div>
        <span class="color-hex" id="colorHex">#FFFFFF</span>
      </div>
    </div>

    <!-- DLボタン -->
    <button class="dl-btn" id="dlBtn" onclick="downloadPNG()">
      ↓ &nbsp;PNG をダウンロード
    </button>

  </div>

  <!-- プレビュー -->
  <div class="preview-area">
    <div class="preview-label">Preview</div>
    <div class="canvas-wrapper">
      <canvas id="previewCanvas"></canvas>
    </div>
    <div class="size-info" id="sizeInfo">–</div>
  </div>
</div>

<script>
  // ─── 状態 ───
  let customFontLoaded = false;
  let customFontFamily = '';

  // ─── 要素取得 ───
  const canvas   = document.getElementById('previewCanvas');
  const ctx      = canvas.getContext('2d');
  const textInput   = document.getElementById('textInput');
  const fontFile    = document.getElementById('fontFile');
  const fontName    = document.getElementById('fontName');
  const uploadZone  = document.getElementById('uploadZone');
  const fontSize    = document.getElementById('fontSize');
  const lineHeightI = document.getElementById('lineHeight');
  const paddingI    = document.getElementById('padding');
  const colR = document.getElementById('colR');
  const colG = document.getElementById('colG');
  const colB = document.getElementById('colB');
  const valR = document.getElementById('valR');
  const valG = document.getElementById('valG');
  const valB = document.getElementById('valB');
  const colorSwatch = document.getElementById('colorSwatch');
  const colorHex    = document.getElementById('colorHex');
  const sizeInfo    = document.getElementById('sizeInfo');

  // ─── フォント読み込み ───
  fontFile.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    await loadFont(file);
  });

  // ドラッグ&ドロップ
  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
  uploadZone.addEventListener('drop', async (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file && (file.name.endsWith('.ttf') || file.name.endsWith('.otf'))) {
      await loadFont(file);
    }
  });

  async function loadFont(file) {
    const url = URL.createObjectURL(file);
    const name = file.name.replace(/\.[^.]+$/, '').replace(/\s/g, '_') + '_custom';
    customFontFamily = name;
    try {
      const font = new FontFace(name, `url(${url})`);
      await font.load();
      document.fonts.add(font);
      customFontLoaded = true;
      fontName.textContent = '✓ ' + file.name;
      render();
    } catch(err) {
      fontName.textContent = '読み込み失敗';
      console.error(err);
    }
  }

  // ─── RGB → Hex ───
  function toHex(v) { return v.toString(16).padStart(2, '0').toUpperCase(); }
  function updateColor() {
    const r = +colR.value, g = +colG.value, b = +colB.value;
    valR.textContent = r; valG.textContent = g; valB.textContent = b;
    const hex = `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    colorHex.textContent = hex;
    const rgba = `rgba(${r},${g},${b},1)`;
    colorSwatch.style.setProperty('--preview-color', rgba);
    render();
  }
  colR.addEventListener('input', updateColor);
  colG.addEventListener('input', updateColor);
  colB.addEventListener('input', updateColor);

  // ─── その他の入力 ───
  [textInput, fontSize, lineHeightI, paddingI].forEach(el => el.addEventListener('input', render));

  // ─── レンダリング ───
  function render() {
    const text   = textInput.value || ' ';
    const size   = Math.max(8, +fontSize.value || 72);
    const lhMul  = +lineHeightI.value || 1.3;
    const pad    = +paddingI.value || 0;
    const r = +colR.value, g = +colG.value, b = +colB.value;
    const fontFamily = customFontLoaded ? `'${customFontFamily}'` : 'sans-serif';
    const font = `${size}px ${fontFamily}`;

    // 行分割
    const lines = text.split('\n');
    const lh = size * lhMul;

    // サイズ計測
    ctx.font = font;
    let maxW = 0;
    for (const line of lines) {
      const m = ctx.measureText(line);
      if (m.width > maxW) maxW = m.width;
    }

    const W = Math.ceil(maxW) + pad * 2;
    const H = Math.ceil(lh * lines.length) + pad * 2;

    canvas.width  = W || 2;
    canvas.height = H || 2;

    ctx.clearRect(0, 0, W, H);
    ctx.font = font;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.textBaseline = 'top';

    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], pad, pad + i * lh);
    }

    sizeInfo.textContent = `${W} × ${H} px`;
  }

  // ─── DL ───
  function downloadPNG() {
    const link = document.createElement('a');
    link.download = 'text.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  // 初期描画
  updateColor();
  render();
</script>
</body>
</html>
